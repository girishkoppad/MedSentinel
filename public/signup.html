<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MedSentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'opsz' 24; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen flex items-center justify-center py-8">
    <div class="max-w-2xl w-full mx-4">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <span class="material-symbols-rounded text-white text-2xl">person_add</span>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Create Account</h1>
            <p class="text-gray-400 mt-2">Join MedSentinel to access personalized healthcare services</p>
        </div>

        <!-- Sign Up Form -->
        <div class="bg-gradient-to-br from-gray-800/50 to-gray-900/50 backdrop-blur-xl p-8 rounded-2xl border border-white/10 shadow-2xl">
            <form id="signupForm" class="space-y-6">
                <!-- Basic Info -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Full Name *</label>
                        <input type="text" id="fullName" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter your full name" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Email Address *</label>
                        <input type="email" id="email" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Phone Number *</label>
                        <input type="tel" id="phone" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter your phone number" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Password *</label>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Create a secure password" required>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Date of Birth *</label>
                        <input type="date" id="dob" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Gender *</label>
                        <select id="gender" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer-not-to-say">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <!-- Address -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Address *</label>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="street" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Street address" required>
                        <input type="text" id="city" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="City" required>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4 mt-4">
                        <input type="text" id="state" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="State" required>
                        <input type="text" id="postalCode" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Postal code" required>
                    </div>
                </div>

                <!-- Medical Info -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Blood Group</label>
                        <select id="bloodGroup" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select blood group</option>
                            <option value="A+">A Positive (A+)</option>
                            <option value="A-">A Negative (A-)</option>
                            <option value="B+">B Positive (B+)</option>
                            <option value="B-">B Negative (B-)</option>
                            <option value="AB+">AB Positive (AB+)</option>
                            <option value="AB-">AB Negative (AB-)</option>
                            <option value="O+">O Positive (O+)</option>
                            <option value="O-">O Negative (O-)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Allergies</label>
                        <input type="text" id="allergies" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="e.g. Penicillin, Peanuts">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Known Medical Conditions</label>
                    <textarea id="medicalConditions" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" rows="3" placeholder="List any known medical conditions"></textarea>
                </div>

                <!-- Government Scheme -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Do you have a government scheme card?</label>
                    <div class="flex gap-6 mb-4">
                        <label class="flex items-center">
                            <input type="radio" name="hasScheme" value="no" class="border-white/20 bg-white/10 text-blue-500 focus:ring-blue-500" checked>
                            <span class="ml-2 text-gray-300">No</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="hasScheme" value="yes" class="border-white/20 bg-white/10 text-blue-500 focus:ring-blue-500">
                            <span class="ml-2 text-gray-300">Yes</span>
                        </label>
                    </div>
                    <div id="schemeDetails" class="hidden space-y-4">
                        <div class="grid md:grid-cols-2 gap-4">
                            <input type="text" id="schemeName" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Scheme name">
                            <input type="text" id="cardNumber" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Card number">
                        </div>
                        <div>
                            <input type="date" id="expiryDate" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Expiry date">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl hover:shadow-lg hover:shadow-blue-500/50 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-rounded">person_add</span>
                    Create Account
                </button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-gray-400">Already have an account? <a href="/login.html" class="text-blue-400 hover:text-blue-300 font-semibold">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        // Toggle scheme details
        document.querySelectorAll('input[name="hasScheme"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const schemeDetails = document.getElementById('schemeDetails');
                if (this.value === 'yes') {
                    schemeDetails.classList.remove('hidden');
                } else {
                    schemeDetails.classList.add('hidden');
                }
            });
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Collect form data
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                address: {
                    street: document.getElementById('street').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    postalCode: document.getElementById('postalCode').value
                },
                bloodGroup: document.getElementById('bloodGroup').value,
                allergies: document.getElementById('allergies').value,
                medicalConditions: document.getElementById('medicalConditions').value,
                hasScheme: document.querySelector('input[name="hasScheme"]:checked').value,
                schemeDetails: document.querySelector('input[name="hasScheme"]:checked').value === 'yes' ? {
                    schemeName: document.getElementById('schemeName').value,
                    cardNumber: document.getElementById('cardNumber').value,
                    expiryDate: document.getElementById('expiryDate').value
                } : null,
                patientId: 'MS-' + Math.floor(100000 + Math.random() * 900000) // Generate random patient ID
            };

            // Basic validation
            if (!formData.fullName || !formData.email || !formData.phone || !formData.password || !formData.dob || !formData.gender || !formData.address.street || !formData.address.city || !formData.address.state || !formData.address.postalCode) {
                alert('Please fill in all required fields');
                return;
            }

            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const existingUser = users.find(u => u.email === formData.email || u.phone === formData.phone);
            if (existingUser) {
                alert('An account with this email or phone number already exists');
                return;
            }

            // Save user
            users.push(formData);
            localStorage.setItem('users', JSON.stringify(users));

            // Set current user profile
            localStorage.setItem('userProfile', JSON.stringify(formData));

            alert('Account created successfully!');
            window.location.href = '/profile.html';
        });
    </script>
</body>
</html>
