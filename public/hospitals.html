<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Hospitals - MedSentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        select option { background-color: #1f2937; color: white; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white">
    <!-- Modern Navigation -->
    <nav class="bg-black/50 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-blue-500/50 transition-all">
                        <span class="material-symbols-rounded text-white text-xl">health_and_safety</span>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">MedSentinel</span>
                </a>
                
                <div class="flex-1 max-w-2xl mx-8">
                    <div class="relative">
                        <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
                        <input id="searchBox" type="text" placeholder="Search hospitals, treatments..." class="w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white/10 transition-all text-white placeholder-gray-400">
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <a href="/" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white hover:bg-white/5 rounded-lg transition-all">Home</a>
                    <a href="/schemes.html" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white hover:bg-white/5 rounded-lg transition-all">Schemes</a>
                    <a href="/profile.html" class="p-2 text-gray-300 hover:text-white hover:bg-white/5 rounded-lg transition-all">
                        <span class="material-symbols-rounded">account_circle</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex gap-8">
            <!-- Modern Filters Sidebar -->
            <aside class="w-80 flex-shrink-0">
                <div class="bg-gradient-to-br from-gray-800/50 to-gray-900/50 backdrop-blur-xl rounded-2xl p-6 border border-white/10 sticky top-24 space-y-6">
                    <div>
                        <h2 class="text-xl font-bold mb-1 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Filters</h2>
                        <p class="text-sm text-gray-400">Refine your search</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-3">Specialization</label>
                        <select id="specFilter" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 text-white">
                            <option value="">All Specializations</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Orthopedics">Orthopedics</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Oncology">Oncology</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Obstetrics">Obstetrics & Gynecology</option>
                            <option value="General Surgery">General Surgery</option>
                            <option value="General Medicine">General Medicine</option>
                            <option value="Nephrology">Nephrology</option>
                            <option value="Pulmonology">Pulmonology</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-3">Distance</label>
                        <select id="distanceFilter" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 text-white">
                            <option value="">Any Distance</option>
                            <option value="10">Within 10 km</option>
                            <option value="20">Within 20 km</option>
                            <option value="200">Within 200 km</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-3">Minimum Rating</label>
                        <select id="ratingFilter" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 text-white">
                            <option value="">Any Rating</option>
                            <option value="4">4+ Stars</option>
                            <option value="4.5">4.5+ Stars</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-3">Government Schemes</label>
                        <div class="space-y-2">
                            <label class="flex items-center space-x-3 p-3 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer transition-all">
                                <input type="checkbox" class="scheme-filter w-5 h-5 text-blue-500 rounded focus:ring-blue-500 bg-white/10 border-white/20" value="Ayushman Bharat PM-JAY">
                                <span class="text-sm font-medium text-gray-300">Ayushman Bharat PM-JAY</span>
                            </label>
                            <label class="flex items-center space-x-3 p-3 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer transition-all">
                                <input type="checkbox" class="scheme-filter w-5 h-5 text-blue-500 rounded focus:ring-blue-500 bg-white/10 border-white/20" value="Aarogya Karnataka">
                                <span class="text-sm font-medium text-gray-300">Aarogya Karnataka</span>
                            </label>
                            <label class="flex items-center space-x-3 p-3 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer transition-all">
                                <input type="checkbox" class="scheme-filter w-5 h-5 text-blue-500 rounded focus:ring-blue-500 bg-white/10 border-white/20" value="CGHS">
                                <span class="text-sm font-medium text-gray-300">CGHS</span>
                            </label>
                            <label class="flex items-center space-x-3 p-3 bg-white/5 rounded-xl hover:bg-white/10 cursor-pointer transition-all">
                                <input type="checkbox" class="scheme-filter w-5 h-5 text-blue-500 rounded focus:ring-blue-500 bg-white/10 border-white/20" value="ESIC">
                                <span class="text-sm font-medium text-gray-300">ESIC</span>
                            </label>
                        </div>
                    </div>

                    <button onclick="applyFilters()" class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-blue-500/50 transition-all">
                        Apply Filters
                    </button>

                    <button onclick="resetFilters()" class="w-full py-3 bg-white/5 text-gray-300 font-semibold rounded-xl hover:bg-white/10 transition-all">
                        Reset All
                    </button>
                </div>
            </aside>

            <!-- Results Section -->
            <main class="flex-1">
                <div class="mb-8">
                    <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">Search Results</h1>
                    <p id="resultCount" class="text-gray-400">Loading hospitals...</p>
                    <!-- Personalized banner from search-flow data -->
                    <div id="userBanner" class="hidden mt-4 p-4 bg-gradient-to-r from-blue-500/10 to-purple-500/10 border border-blue-500/30 rounded-xl">
                        <div class="flex flex-wrap items-center gap-3 text-sm">
                            <span class="flex items-center gap-1 text-blue-400 font-semibold">
                                <span class="material-symbols-rounded text-base">person</span>
                                <span id="bannerName"></span>
                            </span>
                            <span class="text-gray-500">|</span>
                            <span class="flex items-center gap-1 text-purple-400 font-semibold">
                                <span class="material-symbols-rounded text-base">search</span>
                                <span id="bannerCondition"></span>
                            </span>
                            <span class="text-gray-500">|</span>
                            <span class="flex items-center gap-1 text-green-400 font-semibold">
                                <span class="material-symbols-rounded text-base">location_on</span>
                                <span id="bannerLocation"></span>
                            </span>
                            <span id="bannerIncomeBadge" class="hidden px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs font-bold rounded-lg border border-yellow-500/30"></span>
                            <a href="/eligibility.html" class="ml-auto px-3 py-1.5 bg-gradient-to-r from-green-600 to-emerald-600 text-white text-xs font-bold rounded-lg hover:shadow-lg transition-all">
                                Check Scheme Eligibility →
                            </a>
                        </div>
                    </div>
                    <!-- Treatment Cost Info from Excel Dataset -->
                    <div id="costInfoBanner" class="hidden mt-4 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl">
                        <div class="flex items-start gap-3">
                            <span class="material-symbols-rounded text-blue-400 mt-0.5">info</span>
                            <div>
                                <div class="text-sm font-semibold text-blue-400 mb-1">Estimated Treatment Costs (Karnataka)</div>
                                <div id="costInfoText" class="text-xs text-gray-300"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="hospitalsList" class="space-y-6"></div>
            </main>
        </div>
    </div>

    <script>
        let allHospitals = [];

        async function loadHospitals() {
            try {
                const response = await fetch('/api/hospitals');
                allHospitals = await response.json();
                displayHospitals(allHospitals);
            } catch (error) {
                console.error('Error loading hospitals:', error);
            }
        }

        function displayHospitals(hospitals) {
            const container = document.getElementById('hospitalsList');
            document.getElementById('resultCount').textContent = `${hospitals.length} hospitals found`;
            
            const hospitalImages = [
                'https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=600&h=400&fit=crop',
                'https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=600&h=400&fit=crop',
                'https://images.unsplash.com/photo-1516549655169-df83a0774514?w=600&h=400&fit=crop',
                'https://images.unsplash.com/photo-1587351021759-3e566b6af7cc?w=600&h=400&fit=crop',
                'https://images.unsplash.com/photo-1512678080530-7760d81faba6?w=600&h=400&fit=crop'
            ];
            
            container.innerHTML = hospitals.map((h, index) => `
                <div class="group bg-gradient-to-br from-gray-800/50 to-gray-900/50 backdrop-blur-xl rounded-2xl overflow-hidden border border-white/10 hover:border-blue-500/50 transition-all duration-300 hover:shadow-2xl hover:shadow-blue-500/20">
                    <div class="flex flex-col md:flex-row gap-6 p-6">
                        <div class="w-full md:w-48 h-48 rounded-xl overflow-hidden flex-shrink-0 relative">
                            <img src="${h.image_url || hospitalImages[index % hospitalImages.length]}" alt="${h.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=600&h=400&fit=crop'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <div class="absolute top-3 right-3 bg-black/80 backdrop-blur-sm px-3 py-1.5 rounded-lg">
                                <div class="flex items-center space-x-1">
                                    <span class="material-symbols-rounded text-yellow-400 text-sm">star</span>
                                    <span class="font-bold text-white text-sm">${parseFloat(h.rating).toFixed(1)}</span>
                                </div>
                            </div>
                            <div class="absolute bottom-3 left-3">
                                <span class="px-2 py-1 bg-green-500/80 text-white text-xs font-bold rounded-lg">PM-JAY Empanelled</span>
                            </div>
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex-1 min-w-0 pr-4">
                                    <h3 class="text-xl font-bold text-white mb-1 group-hover:text-blue-400 transition-colors truncate">${h.name}</h3>
                                    <div class="flex flex-wrap items-center gap-3 text-sm text-gray-400">
                                        <span class="flex items-center gap-1">
                                            <span class="material-symbols-rounded text-base text-blue-400">location_on</span>
                                            <span class="truncate max-w-xs">${h.location}</span>
                                        </span>
                                        <span class="flex items-center gap-1">
                                            <span class="material-symbols-rounded text-base text-green-400">near_me</span>
                                            <span>${h.distance} km</span>
                                        </span>
                                    </div>
                                </div>
                                <span class="px-3 py-1 bg-green-500/20 text-green-400 text-xs font-semibold rounded-lg border border-green-500/30 flex-shrink-0">Verified</span>
                            </div>
                            
                            <!-- Specializations -->
                            <div class="flex flex-wrap gap-2 mb-3">
                                ${h.specialization.split(',').slice(0,4).map(s => `
                                    <span class="px-2 py-1 bg-purple-500/20 text-purple-300 text-xs font-medium rounded-lg border border-purple-500/20">${s.trim()}</span>
                                `).join('')}
                            </div>

                            <!-- Schemes -->
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${h.schemes.split(',').map(s => `
                                    <span class="px-2 py-1 bg-blue-500/20 text-blue-400 text-xs font-medium rounded-lg border border-blue-500/30">${s.trim()}</span>
                                `).join('')}
                            </div>

                            <div class="flex items-center justify-between pt-4 border-t border-white/10">
                                <div>
                                    <span class="text-xs text-gray-400">Estimated Cost</span>
                                    <div class="text-lg font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">${h.cost_range}</div>
                                </div>
                                <div class="flex gap-3">
                                    <button onclick="saveHospital(${h.id})" class="px-4 py-2 bg-white/5 border border-white/10 text-white text-sm font-semibold rounded-xl hover:bg-white/10 transition-all flex items-center gap-1">
                                        <span class="material-symbols-rounded text-base">bookmark</span> Save
                                    </button>
                                    <a href="/hospital-details.html?id=${h.id}" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-semibold rounded-xl hover:shadow-lg hover:shadow-blue-500/50 transition-all">
                                        View Details →
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Treatment cost data from Excel dataset
        const treatmentCosts = {
            'General consultation': { range: '₹94 - ₹2,000', source: 'NHSCD' },
            'Inpatient admission': { range: '₹300 - ₹7,000', source: 'NHSCD' },
            'Diabetes treatment': { range: '₹25,000 - ₹60,000', source: 'Indian Patient Dataset' },
            'General surgery': { range: '₹45,000 - ₹1,50,000', source: 'Indian Patient Dataset' },
            'Cardiology treatment': { range: '₹50,000 - ₹2,00,000', source: 'Indian Patient Dataset' }
        };

        function applyFilters() {
            let filtered = allHospitals;

            const spec = document.getElementById('specFilter').value;
            if (spec) {
                filtered = filtered.filter(h => h.specialization.toLowerCase().includes(spec.toLowerCase()));
                // Show cost info for the selected specialization
                const costKey = Object.keys(treatmentCosts).find(k => spec.toLowerCase().includes(k.toLowerCase().split(' ')[0]));
                if (costKey) {
                    document.getElementById('costInfoBanner').classList.remove('hidden');
                    document.getElementById('costInfoText').textContent = `${spec}: ${treatmentCosts[costKey].range} (Source: ${treatmentCosts[costKey].source})`;
                }
            } else {
                document.getElementById('costInfoBanner').classList.add('hidden');
            }
            
            const distance = document.getElementById('distanceFilter').value;
            if (distance) {
                filtered = filtered.filter(h => h.distance <= parseFloat(distance));
            }

            const rating = document.getElementById('ratingFilter').value;
            if (rating) {
                filtered = filtered.filter(h => h.rating >= parseFloat(rating));
            }

            const schemes = Array.from(document.querySelectorAll('.scheme-filter:checked')).map(cb => cb.value);
            if (schemes.length > 0) {
                filtered = filtered.filter(h => schemes.some(s => h.schemes.includes(s)));
            }

            displayHospitals(filtered);
        }

        function resetFilters() {
            document.getElementById('specFilter').value = '';
            document.getElementById('distanceFilter').value = '';
            document.getElementById('ratingFilter').value = '';
            document.querySelectorAll('.scheme-filter').forEach(cb => cb.checked = false);
            document.getElementById('costInfoBanner').classList.add('hidden');
            displayHospitals(allHospitals);
        }

        async function saveHospital(hospitalId) {
            try {
                await fetch('/api/saved-items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 1, hospital_id: hospitalId })
                });
                
                const notification = document.createElement('div');
                notification.className = 'fixed top-4 right-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white px-6 py-3 rounded-xl shadow-lg z-50 animate-slideInRight';
                notification.innerHTML = '<div class="flex items-center space-x-2"><span class="material-symbols-rounded">check_circle</span><span>Hospital saved successfully!</span></div>';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 2000);
            } catch (error) {
                console.error('Error saving hospital:', error);
            }
        }

        document.getElementById('searchBox').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = allHospitals.filter(h => 
                h.name.toLowerCase().includes(search) || 
                h.location.toLowerCase().includes(search) ||
                h.specialization.toLowerCase().includes(search)
            );
            displayHospitals(filtered);
        });

        // ── Read URL params from search-flow and apply them ──
        function applyUrlParams() {
            const p = new URLSearchParams(window.location.search);
            const condition = p.get('search') || p.get('condition') || '';
            const location  = p.get('location') || '';
            const name      = p.get('name') || '';
            const income    = p.get('income') || '';
            const age       = p.get('age') || '';

            // Show personalized banner if user came from search-flow
            if (name || condition) {
                const banner = document.getElementById('userBanner');
                banner.classList.remove('hidden');
                if (name) document.getElementById('bannerName').textContent = name + (age ? ', Age ' + age : '');
                document.getElementById('bannerCondition').textContent = condition || 'All treatments';
                document.getElementById('bannerLocation').textContent = location || 'Karnataka';
                if (income) {
                    const incomeLabels = { bpl: 'BPL', low: 'Low Income', middle: 'Middle Income', high: 'High Income' };
                    const badge = document.getElementById('bannerIncomeBadge');
                    badge.textContent = incomeLabels[income] || income;
                    badge.classList.remove('hidden');
                }
            }

            // Auto-filter hospitals by condition
            if (condition && allHospitals.length > 0) {
                const filtered = allHospitals.filter(h =>
                    h.name.toLowerCase().includes(condition.toLowerCase()) ||
                    h.location.toLowerCase().includes(condition.toLowerCase()) ||
                    h.specialization.toLowerCase().includes(condition.toLowerCase())
                );
                displayHospitals(filtered.length > 0 ? filtered : allHospitals);
            }
        }

        loadHospitals().then(applyUrlParams);
    </script>
</body>
</html>
